# ── memory + storage ──────────────────────────────────────────
# V2 [memory.qdrant] → V3 [storage.qdrant.default],
# V2 [memory.postgres] vector fields → V3 [storage.postgres.default],
# V2 [memory].sqlite_open_timeout_secs → V3 [storage.sqlite.default].open_timeout_secs,
# V2 [storage.provider.config] → V3 [storage.<backend>.default].
[memory]
backend = "qdrant"
sqlite_open_timeout_secs = 60
auto_save = true
hygiene_enabled = true
archive_after_days = 7
purge_after_days = 30
embedding_provider = "none"
search_mode = "hybrid"

[memory.qdrant]
url = "http://localhost:6333"
collection = "zc_memories"
api_key = "qdrant-api-key"

[memory.postgres]
host = "pg.example.com"
port = 5432
database = "zc_vectors"
user = "zc"
password = "pg-password"
vector_dimensions = 1536
vector_enabled = true

[storage.provider.config]
provider = "postgres"
db_url = "postgres://user:pass@localhost/zc"
schema = "zeroclaw"
table = "memories"
connect_timeout_secs = 30

# ── agents (inline brain → model_providers.<provider>.agent_<id>) ──
[agents.simple_agent]
provider = "openai"
model = "gpt-4o-mini"

[agents.complex_agent]
provider = "anthropic"
model = "claude-sonnet-4-5"
api_key = "sk-ant-complex"
temperature = 0.3
max_iterations = 25
max_depth = 4
agentic = true
allowed_tools = ["shell", "memory"]
timeout_secs = 180
agentic_timeout_secs = 600
skills_directory = "/opt/zeroclaw/skills"
memory_namespace = "complex"

# Cost tracking limits: this comment exists solely to verify that comments on a surviving section round-trip through the V1→V2→V3 migration. Asserted by `comment_preserved_on_surviving_key`.
[cost]
enabled = true
daily_limit_usd = 25.0
monthly_limit_usd = 100.0
warn_at_percent = 80

[cost.prices."anthropic/claude-sonnet-4-5"]
