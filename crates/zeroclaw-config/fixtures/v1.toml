# Canonical V1 fixture for the V1 → V2 → V3 migration chain.
#
# Hand-authored to exercise every typed transformation in `V1Config`
# (api_key/api_url/api_path/default_provider/default_model/
# default_temperature/provider_timeout_secs/provider_max_tokens/
# extra_headers/model_providers/model_routes/embedding_routes/
# channels_config) and every V2 → V3 transform in `V2Config`
# (autonomy → risk_profiles, agent → runtime_profiles, cron jobs[]
# → cron.<alias>, providers.fallback eradicated, providers.models
# flat → aliased, cost.prices dropped with INFO logs, channels.<type>
# Option → HashMap, channels.discord_history → discord.archive,
# inline-brain agent fields → model_providers.<provider>.agent_<id>,
# allowed_users/contacts/from/numbers/senders/pubkeys → peer_groups,
# tts.<type> → tts_providers.<type>.default, transcription per-family
# fold → transcription_providers.<family>.default,
# memory.{qdrant,postgres,sqlite_open_timeout_secs} →
# storage.<backend>.default, memory_namespace dropped,
# storage.provider.config → storage.postgres.default,
# tunnel.provider → tunnel.tunnel_provider rename,
# web_search.provider → web_search.search_provider rename,
# colon-URL providers split, base_url + api_path → uri).
#
# Subsystems that V1 carried but V1Config doesn't type explicitly
# (backup, gateway, proxy, hooks, mcp, etc.) ride through
# `passthrough` untouched into V3 deserialize.

# ── 12 V1 globals folded into V2 [providers] ───────────────────
api_key       = "sk-v1-test-global"
api_url       = "https://api.example.com/v1"
api_path      = "/chat/completions"
default_provider = "openai"
default_model = "gpt-4o-mini"
default_temperature = 0.5
provider_timeout_secs = 90
provider_max_tokens   = 4096

[extra_headers]
User-Agent   = "ZeroClaw-V1-Test/1.0"
"X-Title"    = "zeroclaw"

# ── model_providers (V1 flat keys → V3 model_providers.<type>.<alias>) ──
[model_providers.anthropic]
base_url = "https://api.anthropic.com"
api_key = "sk-ant-anthropic"

[model_providers.claude-code]
# Empty entry — folds under anthropic.claude-code per V3 normalize_provider_type.

[model_providers.openrouter]
api_key = "sk-or-key"
model = "google/gemini-2.0-flash"

[model_providers.ollama]
base_url = "http://localhost:11434"
model = "llama3.1:8b"

[model_providers.groq]
api_key = "gsk-groq-key"
model = "llama-3.1-70b-versatile"

[model_providers.gemini]
api_key = "gemini-api-key"
model = "gemini-1.5-pro"

[model_providers.xai]
api_key = "xai-key"
model = "grok-2"

[model_providers.openai-codex]
# Folds under openai.codex with wire_api=responses + requires_openai_auth=true
requires_openai_auth = true
model = "gpt-5-codex"

# ── routes ──────────────────────────────────────────────────────
[[model_routes]]
hint     = "fast"
provider = "openai"
model    = "gpt-4o-mini"

[[model_routes]]
hint     = "vision"
provider = "anthropic"
model    = "claude-3-5-sonnet"

[[embedding_routes]]
hint       = "semantic"
provider   = "openai"
model      = "text-embedding-3-small"
dimensions = 1536

