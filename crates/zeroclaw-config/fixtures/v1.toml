# ── autonomy → risk_profiles.default ──────────────────────────
[autonomy]
level = "supervised"
workspace_only = true
allowed_commands = ["ls", "git", "cat"]
forbidden_paths = ["/etc"]
max_actions_per_hour = 100
max_cost_per_day_cents = 1000
require_approval_for_medium_risk = true
block_high_risk_commands = true
shell_env_passthrough = ["PATH", "HOME"]
auto_approve = ["weather"]
always_ask = []
allowed_roots = ["~/workspace"]
non_cli_excluded_tools = ["browser"]
shell_timeout_secs = 60

# ── agent → runtime_profiles.default ──────────────────────────
[agent]
parallel_tools = true
max_history_messages = 50
max_context_tokens = 32000
tool_dispatcher = "auto"
max_tool_iterations = 10

# ── security.sandbox + security.resources → risk_profiles.default ──
[security.sandbox]
enabled = true
backend = "firejail"
firejail_args = ["--noroot"]

[security.resources]
max_memory_mb = 512
max_cpu_time_seconds = 600
max_subprocesses = 10
memory_monitoring = true

# ── cron (jobs[] → cron.<alias>; subsystem knobs → [scheduler]) ──
[cron]
enabled = true
catch_up_on_startup = true
max_run_history = 50

[[cron.jobs]]
id = "morning-digest-id"
name = "Morning Digest"
job_type = "agent"
schedule = { kind = "cron", expr = "0 8 * * *" }
prompt = "Summarize unread messages"
enabled = true

# ── reliability (V3 drops fallback_providers + model_fallbacks) ──
[reliability]
provider_retries = 3
provider_backoff_ms = 500
fallback_providers = ["anthropic", "openai"]
api_keys = []
channel_initial_backoff_secs = 2
channel_max_backoff_secs = 60
scheduler_poll_secs = 15
scheduler_retries = 2

[reliability.model_fallbacks]
"gpt-4o" = ["claude-sonnet-4-5", "gpt-4o-mini"]

# ── tts.<type> → tts_providers.<type>.default ─────────────────
[tts]
enabled = true
default_provider = "openai"
default_voice = "alloy"
default_format = "mp3"
max_text_length = 4096

[tts.openai]
api_key = "sk-tts-openai"
model = "tts-1-hd"
speed = 1.0

[tts.elevenlabs]
api_key = "sk-tts-eleven"
model_id = "eleven_monolingual_v1"
stability = 0.5
similarity_boost = 0.5

[tts.google]
