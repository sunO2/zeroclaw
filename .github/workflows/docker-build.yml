name: Docker Build & Push (Debian)

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]

  pull_request:
    branches: [ master, main ]

  # 手动触发（推荐）
  workflow_dispatch:
    inputs:
      branch:
        description: '要构建的分支或 Tag'
        required: true
        default: 'master'
        type: string

      push_image:
        description: '是否推送到 GHCR？'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

      cargo_features:
        description: 'ZEROCLAW_CARGO_FEATURES（多个用逗号分隔）'
        required: false
        default: 'rag-pdf'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=debian,enable=true

      - name: Build and push Docker image (Debian)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.debian
          push: ${{ github.event_name != 'pull_request' && (inputs.push_image == 'true' || github.event_name == 'push') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ZEROCLAW_CARGO_FEATURES=${{ inputs.cargo_features }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
